project_name: quantile_temperature_extremes_synoptic_network

data:
  input_csv: data/raw/data.csv
  station_info_csv: data/raw/stationsInfo.csv
  read_csv_kwargs: {}
  column_map: {}
  date_columns: [year, month, day]

preprocessing:
  leap_day_strategy: drop
  qc:
    temperature_bounds_celsius:
      tmin: [-60, 60]
      tmean: [-60, 60]
      tmax: [-60, 65]

methodology:
  reference_period: [1961, 1990]
  network_aggregation: simple_mean
  network_id: six_station_network

feature_engineering:
  min_reference_samples_per_doy: 20
  min_year_coverage_for_index: 0.9

